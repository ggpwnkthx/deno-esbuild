name: Publish
on:
  push:
    branches:
      - main

jobs:
  publish-esbuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup Deno
        uses: denoland/setup-deno@v1
      - name: Publish esbuild
        run: deno run --cwd ./esbuild jsr publish

  publish-tier-2:
    runs-on: ubuntu-latest
    needs: publish-esbuild
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup Deno
        uses: denoland/setup-deno@v1
      - name: Publish plugins/deno
        run: deno run --cwd ./plugins/deno jsr publish
      - name: Publish plugins/css
        run: deno run --cwd ./plugins/css jsr publish
      - name: Publish wrappers/shared
        run: deno run --cwd ./wrappers/shared jsr publish

  publish-wrappers-hono:
    runs-on: ubuntu-latest
    needs: publish-tier-2
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup Deno
        uses: denoland/setup-deno@v1
      - name: Publish wrappers/hono
        run: deno run --cwd ./wrappers/hono jsr publish

  publish-wrappers-oak:
    runs-on: ubuntu-latest
    needs: publish-tier-2
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup Deno
        uses: denoland/setup-deno@v1
      - name: Publish wrappers/oak
        run: deno run --cwd ./wrappers/oak jsr publish