name: CI / Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DENO_ESBUILD_VERSION: "2.8.3"
  DENO_PACKAGE_VERSION: "2.7.14"
  GO_VERSION: "1.26.4"

jobs:
  esbuild:
    name: CI + build (esbuild) + publish (JSR)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_ESBUILD_VERSION }}

      - name: Run fmt
        run: deno fmt --check
        working-directory: esbuild

      - name: Run lint
        run: deno lint
        working-directory: esbuild

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Build esbuild binaries
        run: deno task build --clean

      - name: Run check
        run: deno check **/*.ts
        working-directory: esbuild

      - name: Publish esbuild
        run: deno publish
        working-directory: esbuild

      - name: Upload esbuild build output
        uses: actions/upload-artifact@v4
        with:
          name: esbuild-build
          # Replace this with the actual generated files/directories.
          # Examples only:
          path: |
            esbuild/bin
            esbuild/dist
          if-no-files-found: error
          retention-days: 1

  others:
    name: CI (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: esbuild

    strategy:
      fail-fast: false
      matrix:
        include:
          - package: plugins/deno
            test: true
          - package: plugins/css
            test: true
          - package: wrappers/shared
            test: true
          - package: wrappers/hono
            test: true
          - package: wrappers/oak
            test: true

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_PACKAGE_VERSION }}

      # Keep this only if these packages need the built esbuild binaries.
      - name: Download esbuild build output
        uses: actions/download-artifact@v5
        with:
          name: esbuild-build
          path: .

      - name: Run fmt
        run: deno fmt --check
        working-directory: ${{ matrix.package }}

      - name: Run lint
        run: deno lint
        working-directory: ${{ matrix.package }}

      - name: Run check
        run: deno check **/*.ts
        working-directory: ${{ matrix.package }}

      - name: Run test
        if: ${{ matrix.test }}
        run: deno test -A
        working-directory: ${{ matrix.package }}

      - name: Publish
        run: deno publish
        working-directory: ${{ matrix.package }}
