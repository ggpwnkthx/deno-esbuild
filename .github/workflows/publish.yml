name: CI / Publish

on:
  push:
    branches: [main]

env:
  DENO_VERSION: "2.8.3"

jobs:
  esbuild:
    name: CI + publish (JSR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Run fmt
        run: deno fmt --check
        working-directory: esbuild

      - name: Run lint
        run: deno lint
        working-directory: esbuild

      - name: Run check
        run: deno check **/*.ts
        working-directory: esbuild

      - name: Publish esbuild
        run: deno publish
        working-directory: esbuild

  shared:
    name: CI + publish (wrappers/shared)
    runs-on: ubuntu-latest
    needs: esbuild
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Run fmt
        run: deno fmt --check
        working-directory: wrappers/shared

      - name: Run lint
        run: deno lint
        working-directory: wrappers/shared

      - name: Run check
        run: deno check **/*.ts
        working-directory: wrappers/shared

      - name: Publish
        run: deno publish
        working-directory: wrappers/shared

  others:
    name: CI + publish (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: shared
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - package: plugins/deno
            test: true
          - package: plugins/css
            test: true
          - package: wrappers/hono
            test: false
          - package: wrappers/oak
            test: false

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Run fmt
        run: deno fmt --check
        working-directory: ${{ matrix.package }}

      - name: Run lint
        run: deno lint
        working-directory: ${{ matrix.package }}

      - name: Run check
        run: deno check **/*.ts
        working-directory: ${{ matrix.package }}

      - name: Run test
        if: ${{ matrix.test }}
        run: deno test -A
        working-directory: ${{ matrix.package }}

      - name: Publish
        run: deno publish
        working-directory: ${{ matrix.package }}
