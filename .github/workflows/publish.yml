name: Publish
on:
  push:
    branches:
      - main

jobs:
  publish-esbuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup Deno
        uses: denoland/setup-deno@v1
      - name: Publish esbuild
        run: cd ./esbuild && deno run jsr publish

  publish-tier-2:
    runs-on: ubuntu-latest
    needs: publish-esbuild
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup Deno
        uses: denoland/setup-deno@v1
      - name: Publish plugins/deno
        run: cd ./plugins/deno && deno run jsr publish
      - name: Publish plugins/css
        run: cd ./plugins/css && deno run jsr publish
      - name: Publish wrappers/shared
        run: cd ./wrappers/shared && deno run jsr publish

  publish-wrappers-hono:
    runs-on: ubuntu-latest
    needs: publish-tier-2
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup Deno
        uses: denoland/setup-deno@v1
      - name: Publish wrappers/hono
        run: cd ./wrappers/hono && deno run jsr publish

  publish-wrappers-oak:
    runs-on: ubuntu-latest
    needs: publish-tier-2
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup Deno
        uses: denoland/setup-deno@v1
      - name: Publish wrappers/oak
        run: cd ./wrappers/oak && deno run jsr publish