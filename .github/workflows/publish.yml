name: CI / Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DENO_ESBUILD_VERSION: "2.8.3"
  DENO_PACKAGE_VERSION: "2.7.14"
  GO_VERSION: "1.26.4"

jobs:
  esbuild:
    name: CI + build (esbuild)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_ESBUILD_VERSION }}

      - name: Run fmt
        run: deno fmt --check
        working-directory: esbuild

      - name: Run lint
        run: deno lint
        working-directory: esbuild

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Build esbuild binaries
        run: deno task build --clean

      - name: Run check
        run: deno check **/*.ts
        working-directory: esbuild

      - name: Upload esbuild build output
        uses: actions/upload-artifact@v4
        with:
          name: esbuild-build
          # Replace this with the actual generated files/directories.
          # Examples only:
          path: |
            esbuild/bin
            esbuild/dist
          if-no-files-found: error
          retention-days: 1

  tier-2-ci:
    name: CI (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: esbuild

    strategy:
      fail-fast: false
      matrix:
        include:
          - package: plugins/deno
            test: true
          - package: plugins/css
            test: true
          - package: wrappers/shared
            test: false

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_PACKAGE_VERSION }}

      # Keep this only if these packages need the built esbuild binaries.
      - name: Download esbuild build output
        uses: actions/download-artifact@v5
        with:
          name: esbuild-build
          path: .

      - name: Run fmt
        run: deno fmt --check
        working-directory: ${{ matrix.package }}

      - name: Run lint
        run: deno lint
        working-directory: ${{ matrix.package }}

      - name: Run check
        run: deno check **/*.ts
        working-directory: ${{ matrix.package }}

      - name: Run test
        if: ${{ matrix.test }}
        run: deno test -A
        working-directory: ${{ matrix.package }}

  wrappers-ci:
    name: CI (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: tier-2-ci

    strategy:
      fail-fast: false
      matrix:
        package:
          - wrappers/hono
          - wrappers/oak

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_PACKAGE_VERSION }}

      # Keep this only if these packages need the built esbuild binaries.
      - name: Download esbuild build output
        uses: actions/download-artifact@v5
        with:
          name: esbuild-build
          path: .

      - name: Run fmt
        run: deno fmt --check
        working-directory: ${{ matrix.package }}

      - name: Run lint
        run: deno lint
        working-directory: ${{ matrix.package }}

      - name: Run check
        run: deno check **/*.ts
        working-directory: ${{ matrix.package }}

      - name: Run test
        run: deno test -A
        working-directory: ${{ matrix.package }}

  publish-esbuild:
    name: Publish esbuild
    runs-on: ubuntu-latest
    needs: wrappers-ci
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_ESBUILD_VERSION }}

      - name: Download esbuild build output
        uses: actions/download-artifact@v5
        with:
          name: esbuild-build
          path: .

      - name: Publish esbuild
        run: deno publish
        working-directory: esbuild

  publish-tier-2:
    name: Publish tier 2
    runs-on: ubuntu-latest
    needs: publish-esbuild

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_PACKAGE_VERSION }}

      - name: Publish plugins/deno
        run: deno publish
        working-directory: plugins/deno

      - name: Publish plugins/css
        run: deno publish
        working-directory: plugins/css

      - name: Publish wrappers/shared
        run: deno publish
        working-directory: wrappers/shared

  publish-wrappers:
    name: Publish (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: publish-tier-2

    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        package:
          - wrappers/hono
          - wrappers/oak

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_PACKAGE_VERSION }}

      - name: Publish
        run: deno publish
        working-directory: ${{ matrix.package }}
