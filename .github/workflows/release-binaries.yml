name: Release esbuild binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "esbuild version to build, for example 0.28.0 or v0.28.0"
        required: true
        type: string
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    name: Build and release binaries
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.8.3"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: false

      - name: Resolve esbuild version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            raw="${{ inputs.version }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi

          version="${raw#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $raw" >&2
            echo "Expected a stable esbuild version like 0.28.0 or v0.28.0." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Build release assets
        run: |
          deno task bin:build \
            --clean \
            --out-dir ./dist \
            --version "${{ steps.version.outputs.version }}"

      - name: Show release assets
        shell: bash
        run: |
          set -euo pipefail
          find ./dist -maxdepth 1 -type f -print | sort

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          assets=()
          while IFS= read -r -d '' file; do
            assets+=("$file")
          done < <(
            find ./dist -maxdepth 1 -type f \
              \( -name 'esbuild-*' -o -name 'manifest.json' -o -name 'SHA256SUMS' -o -name 'THIRD_PARTY_NOTICES.md' \) \
              -print0 | sort -z
          )

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets found in ./dist." >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" "${assets[@]}" \
            --target "$GITHUB_SHA" \
            --title "esbuild $RELEASE_TAG binaries" \
            --notes-file ./dist/RELEASE_NOTES.md \
            --latest
