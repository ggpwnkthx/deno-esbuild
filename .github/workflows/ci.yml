name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - esbuild
          - plugins/deno
          - plugins/css
          - wrappers/hono
          - wrappers/oak

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.7.7"

      - name: Run fmt
        run: deno fmt --check
        working-directory: ${{ matrix.package }}

      - name: Run lint
        run: deno lint
        working-directory: ${{ matrix.package }}

      - name: Run check
        run: deno check **/*.ts
        working-directory: ${{ matrix.package }}

      - name: Run test
        run: deno test
        working-directory: ${{ matrix.package }}
